name: Update Predictions

on:
  workflow_dispatch:
  schedule:
    - cron: "0 4 * * *"

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Build predictions
        run: node scripts/build_predictions.js

      - name: Simulate tournament
        run: node scripts/simulate_tournaments.js
        
      - name: Commit updated predictions
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add data/predictions.json
          git commit -m "Update predictions" || echo "No changes"
          git push