name: Update Predictions

on:
  workflow_dispatch:
  schedule:
    - cron: "0 4 * * *"

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Generate fixtures
        run: node scripts/generate_fixtures.js

      - name: Build predictions
        run: node scripts/build_predictions.js

      - name: Explain predictions
        run: node scripts/explain_predictions.js

      - name: Simulate tournament
        run: node scripts/simulate_tournament.js

      - name: Generate Golden Boot
        run: node scripts/golden_boot.js

      - name: Generate knockout bracket
        run: node scripts/generate_knockout.js

      - name: Commit updated data
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add data/*.json
          git commit -m "Update prediction data" || echo "No changes"
          git push
